<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="mcpgawk — gawk at it before you trust it">
  <defs>
    <style>
      .mono{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace}
    </style>
  </defs>

  <!-- surface -->
  <rect width="1280" height="640" fill="#16160F"/>

  <!-- family footer label, top-left -->
  <text x="96" y="112" class="mono" font-size="22" letter-spacing="1" fill="#6f6f66">nativerse · gawk.dev</text>

  <!-- primary lockup -->
  <circle cx="122" cy="286" r="26" fill="#7B83F0"/>
  <text x="176" y="286" dominant-baseline="central" class="mono" font-size="128" letter-spacing="-4" fill="#ECEBE3">mcpgawk</text>

  <!-- tagline -->
  <text x="98" y="392" class="mono" font-size="40" letter-spacing="0" fill="#b9b8ae">gawk at it before you trust it.</text>

  <!-- hairline rule -->
  <line x1="96" y1="452" x2="1184" y2="452" stroke="#33332e" stroke-width="1.5"/>

  <!-- faint real CLI proof line -->
  <text x="96" y="516" class="mono" font-size="25" fill="#5f5f57"><tspan fill="#36C28B">●</tspan> cli-stdio   14 tools   2061 tok@connect   4 flagged</text>

  <!-- local / no-egress promise chip -->
  <g>
    <circle cx="108" cy="566" r="6" fill="#36C28B"/>
    <text x="124" y="566" dominant-baseline="central" class="mono" font-size="24" letter-spacing="1" fill="#8a8a80">local · no inventory ever leaves your machine</text>
  </g>
</svg>
