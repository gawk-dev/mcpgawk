name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
  workflow_dispatch: {}

jobs:
  # THE RELEASE GATE. Until 2026-07-21 this workflow published straight from the push: ci.yml ran
  # alongside it as an independent workflow, so a commit that broke the suite and touched
  # pyproject.toml shipped to PyPI anyway and merely turned CI red next to it. PyPI has no unpublish
  # â€” a bad version is permanent â€” so the tests must be a precondition of upload, not a parallel
  # opinion about it. This repo cannot use branch protection to express that (it is enforced on the
  # private repo's plan, and protection would not cover a workflow-dispatch run in any case), so the
  # dependency is expressed here, where it holds for every trigger.
  #
  # Same matrix as ci.yml on purpose: the engine claims >=3.10, so "the tests passed" must mean
  # passed on the oldest version we promise, not just on the newest.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Tests must pass before anything is uploaded
        run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fail loudly if the PyPI token isn't configured
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "::error::PYPI_API_TOKEN secret is not set â€” add it under repo Settings > Secrets before this can publish."
            exit 1
          fi

      - name: Skip if this version is already published (re-running main shouldn't re-publish)
        run: |
          LOCAL=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          LIVE=$(python -c "import json,urllib.request; print(json.load(urllib.request.urlopen('https://pypi.org/pypi/mcpgawk/json'))['info']['version'])" 2>/dev/null || echo "none")
          echo "local=$LOCAL live=$LIVE"
          echo "LOCAL_VERSION=$LOCAL" >> "$GITHUB_ENV"
          if [ "$LOCAL" = "$LIVE" ]; then
            echo "Already published â€” skipping."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - run: python -m pip install --upgrade pip build
        if: env.SKIP != '1'

      - run: python -m build
        if: env.SKIP != '1'

      - name: Publish to PyPI
        if: env.SKIP != '1'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          # --skip-existing + retry: on 2026-07-23 (0.1.7) upload.pypi.org connect-timeouts made
          # twine exit 1 AFTER both artefacts had already landed â€” a RED run over a SUCCESSFUL
          # publish, and a plain re-run would then fail with "file already exists". --skip-existing
          # makes a retry idempotent (already-uploaded files are skipped, not errored); the loop
          # rides out a transient network blip instead of failing the whole release on it.
          for attempt in 1 2 3; do
            if twine upload --non-interactive --skip-existing dist/*; then
              echo "upload ok (attempt $attempt)"; exit 0
            fi
            echo "::warning::twine upload attempt $attempt failed (likely a transient upload.pypi.org timeout) â€” retrying"
            sleep 20
          done
          echo "::error::twine upload failed after 3 attempts"; exit 1
