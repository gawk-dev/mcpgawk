name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run tests (incl. the structural no-egress invariant)
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Install the built wheel in a clean env and smoke-test the CLI
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/mcpgawk --help

  # version-consistency lived here and compared pyproject.toml against editors/vscode/package.json.
  # Both were removed on 2026-07-21: editors/vscode was a hand-written extension that is NOT the one
  # published to Open VSX, and this job was green because those two stale sides agreed with each
  # other. The extension we ship is built from the platform repo's packages/vscode, so the check
  # moved there (platform-ci.yml, "Version consistency"), where it can see both real artefacts.
  # This repo holds the engine only; it has nothing to compare a version against.
